name: workmate
description: "A workspace app for HRs and employees to help them manage their businesses"
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  easy_localization: ^3.0.8
  cached_network_image: ^3.3.1
  iconsax: ^0.0.8
  file_picker: ^12.0.0-beta.4
  flutter_pdfview: ^1.4.3
  flutter_svg: ^2.2.3
  country_picker: ^2.0.27
  pinput: ^6.0.1
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.3.0
  get_it: ^9.2.0
  dio: ^5.9.1
  equatable: ^2.0.7
  logger: ^2.6.2
  go_router: ^17.0.1
  flutter_bloc: ^9.1.1
  fpdart: ^1.1.0
  toastification: ^3.0.3
  intl: any

  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1

  flutter_native_splash: ^2.4.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  #flutter_launcher_icons: ^0.14.4
  #change_app_package_name: ^1.4.0
  #rename_app: ^1.6.6


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    - assets/svgs/
    - .env.example

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter-variable_font.ttf
